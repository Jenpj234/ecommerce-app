<!doctype html>
<html>
  <head>
    <title>Lesson 4 challenge exercises</title>
    <style>
      body {
        font-family: Arial;
      }

      .title {
        font-size: 25px;
      }

      .login-input {
        padding: 10px 15px;
        margin-bottom: 10px;
        border-radius: 5px;
        border-width: 1px;
        width: 200px;
        margin-right: 10px;
      }

      .login-button {
        background-color: rgb(0, 123, 255);
        color: white;
        margin-right: 5px;
        border: none;
        border-radius: 5px;
        padding: 10px 15px;
        margin-top: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function App () {
        return(
          <>
          <p className="title">Hello, welcome to my website</p>
          <LoginForm />
          <Clock />
          </>
        );
      }

      function LoginForm () {
        const [showPassword, setShowPassword] = React.useState(false);

        function revealPassword() {
          setShowPassword(!showPassword);
        }

        return (
          <>
          <div>
          <input placeholder="Email" className="login-input" />
          </div>
          <div>
          <input placeholder="Password" type={showPassword ? "text" : "password"} className="login-input" />
          <button onClick={revealPassword}>Show</button>
          </div>
          <button className="login-button">Login</button>
          <button className="login-button">Sign up</button>
          </>
        );
      }

      function Clock () {
        const [time, setTime] = React.useState(dayjs().format('HH:mm:ss'));

        React.useEffect(() => {
          setInterval(() => {
            setTime(dayjs().format('HH:mm:ss'));
            console.log('run code');
          }, 1000);
        });

        return(
          <>
            <p>Current time: {time}</p>
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
